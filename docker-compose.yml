services:
  app:
    build:
      context: ./app
      target: builder
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appforge
      DB_USER: appforge
      DB_PASSWORD: appforge_local_senha
    volumes:
      - ./app/src:/app/src
    command: ["node_modules/.bin/nodemon", "src/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appforge
      POSTGRES_USER: appforge
      POSTGRES_PASSWORD: appforge_local_senha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appforge -d appforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge